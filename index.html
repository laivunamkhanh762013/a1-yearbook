<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>A1 Login</title>
</head>

<body style="
  margin:0;
  font-family:Arial;
  background:#d9d4d8;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
">

<div id="box" style="text-align:center;">

  <div style="
    color:#ff4da6;
    font-size:24px;
    margin-bottom:20px;
    font-weight:bold;
  ">
    🔐 Nhập Password
  </div>

  <!-- dots -->
  <div id="dots" style="
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:15px;
  ">
    <div class="dot" style="width:15px;height:15px;border:2px solid #ff4da6;border-radius:50%;"></div>
    <div class="dot" style="width:15px;height:15px;border:2px solid #ff4da6;border-radius:50%;"></div>
    <div class="dot" style="width:15px;height:15px;border:2px solid #ff4da6;border-radius:50%;"></div>
    <div class="dot" style="width:15px;height:15px;border:2px solid #ff4da6;border-radius:50%;"></div>
  </div>

  <!-- hint -->
  <div style="
    font-size:15px;
    color:white;
    margin-bottom:25px;
    background:linear-gradient(45deg,#ff4da6,#ffcc00);
    padding:10px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(255,77,166,0.6);
  ">
    💡 GỢI Ý: Năm sinh của tụi mình 😉
  </div>

  <!-- keypad -->
  <div style="
    display:grid;
    grid-template-columns:repeat(3,80px);
    gap:20px;
    justify-content:center;
  ">

    <div onclick="press(1)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">1</div>
    <div onclick="press(2)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">2</div>
    <div onclick="press(3)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">3</div>

    <div onclick="press(4)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">4</div>
    <div onclick="press(5)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">5</div>
    <div onclick="press(6)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">6</div>

    <div onclick="press(7)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">7</div>
    <div onclick="press(8)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">8</div>
    <div onclick="press(9)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">9</div>

    <div></div>
    <div onclick="press(0)" style="width:80px;height:80px;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">0</div>
    <div onclick="del()" style="width:80px;height:80px;border-radius:50%;background:#ffd6e7;display:flex;align-items:center;justify-content:center;font-size:24px;color:#ff4da6;">⌫</div>

  </div>

</div>

<!-- 🎉 overlay -->
<div id="overlay" style="
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  backdrop-filter:blur(8px);
  background:rgba(0,0,0,0.5);
  justify-content:center;
  align-items:center;
">

  <div id="popup" style="
    background:white;
    padding:30px;
    border-radius:15px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
    box-shadow:0 0 25px rgba(255,255,255,0.7);
    transform:scale(0.5);
    opacity:0;
  ">
    🎉 Bạn là thành viên lớp 7A1 🎉<br>
    Chào mừng bạn!!! 🚀
  </div>

</div>

<script>
let input = "";
const PASS = "2013";

const dots = document.querySelectorAll(".dot");

function updateDots(){
  dots.forEach((d,i)=>{
    d.style.background = i < input.length ? "#ff4da6" : "transparent";
  });
}

function press(num){
  if(input.length >= 4) return;

  input += num;
  updateDots();

  if(input.length === 4){
    check();
  }
}

function del(){
  input = input.slice(0,-1);
  updateDots();
}

function check(){
  if(input === PASS){

    const overlay = document.getElementById("overlay");
    const popup = document.getElementById("popup");

    overlay.style.display = "flex";

    // animation JS
    let scale = 0.5;
    let opacity = 0;

    let anim = setInterval(()=>{
      scale += 0.05;
      opacity += 0.08;

      popup.style.transform = "scale(" + scale + ")";
      popup.style.opacity = opacity;

      if(scale >= 1){
        clearInterval(anim);
      }
    },30);

    // chuyển trang
    setTimeout(()=>{
      window.location.href = "main.html";
    },1500);

  }else{
    alert("Sai rồi 😅");
    input="";
    updateDots();
  }
}

/* bàn phím */
document.addEventListener("keydown",(e)=>{
  if(e.key >= "0" && e.key <= "9"){
    press(e.key);
  }
  if(e.key === "Backspace"){
    del();
  }
});
</script>

</body>
</html>
